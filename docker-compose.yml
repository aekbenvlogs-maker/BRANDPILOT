# ============================================================
# PROJECT      : BRANDSCALE — AI Brand Scaling Tool
# FILE         : docker-compose.yml
# DESCRIPTION  : Full stack compose: backend, frontend, postgres, redis, celery
# ============================================================

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://brandscale:brandscale@postgres:5432/brandscale
  DATABASE_URL_DEV: postgresql+asyncpg://brandscale:brandscale@postgres:5432/brandscale
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  APP_ENV: ${APP_ENV:-development}

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brandscale
      POSTGRES_PASSWORD: brandscale
      POSTGRES_DB: brandscale
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandscale"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Celery Worker ─ bs_ai_text ────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_ai_text.worker.celery_app worker
      --loglevel=info --concurrency=4 --hostname=worker_ai_text@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ─ bs_scoring ───────────────────────────────────
  celery_scoring:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_scoring.worker.celery_app worker
      --loglevel=info --concurrency=8 --hostname=worker_scoring@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ─ bs_email ─────────────────────────────────────
  celery_email:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_email.worker.celery_app worker
      --loglevel=info --concurrency=4 --hostname=worker_email@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (periodic tasks — RGPD purge etc.) ──────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.workflow._celery beat
      --loglevel=info
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Flower ────────────────────────────────────────
  celery_flower:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_ai_text.worker.celery_app flower
      --port=5555 --basic_auth=brandscale:brandscale
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
