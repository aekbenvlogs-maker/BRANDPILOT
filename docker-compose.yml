# ============================================================
# PROJECT      : BRANDSCALE — AI Brand Scaling Tool
# FILE         : docker-compose.yml
# DESCRIPTION  : Full stack compose: backend, frontend, postgres, redis, celery
# ============================================================

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://brandscale:brandscale@postgres:5432/brandscale
  DATABASE_URL_DEV: postgresql+asyncpg://brandscale:brandscale@postgres:5432/brandscale
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  APP_ENV: ${APP_ENV:-development}

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brandscale
      POSTGRES_PASSWORD: brandscale
      POSTGRES_DB: brandscale
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandscale"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Celery Worker ─ bs_ai_text ────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_ai_text.worker.celery_app worker
      --loglevel=info --concurrency=4 --hostname=worker_ai_text@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ─ bs_scoring ───────────────────────────────────
  celery_scoring:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_scoring.worker.celery_app worker
      --loglevel=info --concurrency=8 --hostname=worker_scoring@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ─ bs_email ─────────────────────────────────────
  celery_email:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_email.worker.celery_app worker
      --loglevel=info --concurrency=4 --hostname=worker_email@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ─ bs_ai_image ──────────────────────────────────
  celery_ai_image:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_ai_image.worker.celery_app worker
      --loglevel=info --concurrency=2 --hostname=worker_ai_image@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ─ bs_ai_video ──────────────────────────────────
  celery_ai_video:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.bs_ai_video.worker.celery_app worker
      --loglevel=info --concurrency=2 --hostname=worker_ai_video@%h
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Microservice ─ bs_ai_text (port 8001) ────────────────────────
  bs_ai_text:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn microservices.bs_ai_text.main:app --host 0.0.0.0 --port 8001
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Microservice ─ bs_ai_image (port 8002) ───────────────────────
  bs_ai_image:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn microservices.bs_ai_image.main:app --host 0.0.0.0 --port 8002
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8002/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Microservice ─ bs_ai_video (port 8003) ───────────────────────
  bs_ai_video:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn microservices.bs_ai_video.main:app --host 0.0.0.0 --port 8003
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8003/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Microservice ─ bs_email (port 8004) ──────────────────────────
  bs_email:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn microservices.bs_email.main:app --host 0.0.0.0 --port 8004
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8004/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Microservice ─ bs_scoring (port 8005) ────────────────────────
  bs_scoring:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn microservices.bs_scoring.main:app --host 0.0.0.0 --port 8005
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8005/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Celery Beat (periodic tasks — RGPD purge, analytics) ─────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.workflow:celery_app beat
      --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Flower — monitors ALL workers via shared broker ─────────────
  celery_flower:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery --broker=redis://redis:6379/1 flower
      --port=5555
      --basic_auth=${FLOWER_BASIC_AUTH:-brandscale:brandscale}
      --max_tasks=1000
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

  # ── Celery Worker ─ workflow (RGPD purge + L2C pipeline) ──────────────
  celery_workflow:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A microservices.workflow:celery_app worker
      --loglevel=info --concurrency=2 --hostname=worker_workflow@%h
      -Q celery
    environment:
      <<: *common-env
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Microservice ─ campaign_agent (port 8006) ────────────────────────
  campaign_agent:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn microservices.campaign_agent.main:app --host 0.0.0.0 --port 8006
    environment:
      <<: *common-env
    env_file: .env
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8006/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
