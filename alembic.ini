# ============================================================
# PROJECT      : BRANDSCALE — AI Brand Scaling Tool
# FILE         : alembic.ini
# DESCRIPTION  : Alembic migration configuration
# ============================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Add project root to sys.path so our modules are importable
prepend_sys_path = .

# Filename template for new migration scripts
file_template = %%(rev)s_%%(slug)s

# Timezone for 'Create Date' timestamp
timezone = UTC

# The URL is set dynamically in alembic/env.py from configs.settings
# (reads DATABASE_URL / DATABASE_URL_DEV from environment / .env)
sqlalchemy.url =

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
